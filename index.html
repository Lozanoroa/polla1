<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polla Colombiana</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; padding: 20px; }
    .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    input, button { width: 100%; padding: 14px; margin: 10px 0; font-size: 16px; border-radius: 8px; }
    button { background: #d32f2f; color: white; border: none; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="text-align:center; color:#d32f2f;">🎟️ Polla Colombiana</h1>
    <h2>Registro de Venta</h2>

    <form id="miFormulario" action="https://script.google.com/macros/s/AKfycbyk6o2v-p1ISJFYQNpw8oBUbCYb5i2aPq7nh0XuqP07e9fWLmsgmxr8ilQmu43tK7_MDA/exec" method="POST">
      
      <label>Serial de la Boleta:</label>
      <input type="text" name="serial" required placeholder="Ej: 1242">

      <label>Nombre del Joven que Vendió:</label>
      <input type="text" name="vendedor" required placeholder="Ej: Juan Pérez">

      <label>Nombre del Comprador:</label>
      <input type="text" name="comprador" required>

      <label>Número de Teléfono del Comprador:</label>
      <input type="tel" name="telefono" required>

      <button type="submit">✅ Registrar Venta</button>
    </form>

    <p id="mensaje" style="margin-top:15px; text-align:center; font-weight:bold;"></p>
  </div>

  <script>
    document.getElementById("miFormulario").addEventListener("submit", function() {
      document.getElementById("mensaje").innerHTML = "Registrando...";
      // El formulario se enviará normalmente (redirecciona)
    });
  </script>
</body>
</html>
